<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastFinder</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      background:
        linear-gradient(135deg, rgba(10, 18, 35, 0.88), rgba(20, 41, 74, 0.82)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(12, 20, 36, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 48px;
      line-height: 1.05;
      font-weight: 800;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      font-size: 18px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.88);
    }

    .subtext {
      margin-top: 18px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.72);
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 22px;
      border-radius: 14px;
      background: #ffffff;
      color: #0f2748;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 22px;
      }

      h1 {
        font-size: 36px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">FastFinder Website • Under Construction</div>
    <h1>FastFinder is coming soon</h1>
    <p>
      We are currently preparing the official FastFinder website.
      The app is live, and the full website experience will be available soon.
    </p>
    <p class="subtext">
      Thank you for your patience while we complete the final touches.
    </p>
    <a class="button" href="mailto:fastfinder.app@gmail.com">Contact Us</a>
  </main>
</body>
</html>
